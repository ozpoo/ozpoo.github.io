<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AR Expo</title>
    <script type="module" crossorigin src="/assets/main-CulST5q_.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/___vite-browser-external_commonjs-proxy-B7oTsWaZ.js">
    <link rel="stylesheet" crossorigin href="/assets/main-Bk1-cNqt.css">
  </head>
  <body>
    <a-scene
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      mindar-image="imageTargetSrc: ./assets/target/targets.mind; autoStart: true">
      <a-assets>
        <img
          id="scene-asset"
          crossorigin="anonymous"
          src="/assets/scene-BGwf_9-A.png" />
        <!-- If your "scene" is a GLTF model, uncomment the element below -->
        <!-- <a-asset-item
          id="scene-asset"
          crossorigin="anonymous"
          src="./scene/scene.gltf"></a-asset-item> -->
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-image
          id="scene"
          src="#scene-asset"
          position="0 0 0.1"
          rotation="0 0 0"
          height="1"
          width="1"
          animation="property: position; to: 0 0.1 0.1; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"></a-image>
        <!-- If your "scene" is a GLTF model, uncomment the element below -->
        <!-- <a-gltf-scene
          id="scene"
          src="#scene-asset"
          position="0 0 0.1"
          rotation="0 0 0"
          scale="0.1 0.1 0.1"
          animation="property: position; to: 0 0.1 0.1; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"></a-gltf-scene> -->
      </a-entity>
    </a-scene>
  </body>
</html>
