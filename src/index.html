<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AR Expo</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <a-scene
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      mindar-image="imageTargetSrc: ./assets/target/target.mind; autoStart: true">
      <a-assets>
        <img
          id="scene-asset"
          crossorigin="anonymous"
          src="./assets/scene/scene.png" />
        <!-- If your "scene" is a GLTF model, uncomment the element below -->
        <!-- <a-asset-item
          id="scene-asset"
          crossorigin="anonymous"
          src="./scene/scene.gltf"></a-asset-item> -->
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-image
          id="scene"
          src="#scene-asset"
          position="0 0 0.1"
          rotation="0 0 0"
          height="1"
          width="1"
          animation="property: position; to: 0 0.1 0.1; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"></a-image>
        <!-- If your "scene" is a GLTF model, uncomment the element below -->
        <!-- <a-gltf-scene
          id="scene"
          src="#scene-asset"
          position="0 0 0.1"
          rotation="0 0 0"
          scale="0.1 0.1 0.1"
          animation="property: position; to: 0 0.1 0.1; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate"></a-gltf-scene> -->
      </a-entity>
    </a-scene>
    <script type="module" src="./index.js"></script>
  </body>
</html>
